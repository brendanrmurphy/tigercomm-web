<div class="relative row-fluid-wrapper row--alt">
  <div class="content-wrapper content-wrapper--vertical-spacing">
    <div class="row-fluid">
      <div class="span12">
        <div class="row-fluid-wrapper">
          <h2>Testimonials</h2>
          <div class="grid grid-cols-2">
          {% if testimonials and testimonials|length > 0 %}
            {% for t in testimonials %}
                <div class="testimonial testimonial--sm">
                  {% if t.label %}
                    <h4 class="label">{{ t.label }}</h4>
                  {% endif %}

                  {% if t.quote %}
                    <div class="testimonial__quote">&ldquo;{{ t.quote }}&rdquo;</div>
                  {% endif %}

                  <div class="testimonial__author">
                    {{ t.author }}
                    {% if t.author_title %}
                      <span class="testimonial__author-title">
                        {{ t.author_title }}
                      </span>
                    {% endif %}
                  </div>
                </div>
            {% endfor %}
          {% endif %}
          </div>
        </div>
      </div>
    </div>
    <img
      class="testimonials__bg"
      src="{{ get_asset_url('../images/claw.svg') }}"
      alt=""
    />
  </div>
</div>
